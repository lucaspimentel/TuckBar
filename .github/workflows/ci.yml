name: CI

env:
  ASSEMBLY_NAME: TuckBar
  PROJECT_NAME: TuckBar
  PROJECT_FILE: src/TuckBar/TuckBar.csproj

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore TuckBar.slnx

    - name: Build
      run: dotnet build TuckBar.slnx -c Release --no-restore

    - name: Test
      run: dotnet test TuckBar.slnx -c Release --no-build --verbosity normal

    - name: Publish
      # With UseArtifactsOutput, output lands at artifacts/publish/<ProjectName>/release_<rid>/
      run: dotnet publish ${{ env.PROJECT_FILE }} -c Release -r win-x64

    - name: Upload artifacts
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: ${{ env.ASSEMBLY_NAME }}-win-x64
        path: artifacts/publish/${{ env.PROJECT_NAME }}/release_win-x64/
