name: Release

env:
  ASSEMBLY_NAME: TuckBar
  PROJECT_NAME: TuckBar
  PROJECT_FILE: src/TuckBar/TuckBar.csproj

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore TuckBar.slnx

    - name: Test
      run: dotnet test TuckBar.slnx -c Release --verbosity normal

    - name: Publish
      # With UseArtifactsOutput, output lands at artifacts/publish/<ProjectName>/release_<rid>/
      run: dotnet publish ${{ env.PROJECT_FILE }} -c Release -r win-x64 --self-contained

    - name: Copy documentation
      shell: pwsh
      run: |
        $dist = "artifacts/publish/${{ env.PROJECT_NAME }}/release_win-x64"
        Copy-Item LICENSE $dist/ -ErrorAction SilentlyContinue
        Copy-Item README.md $dist/

    - name: Create archive
      shell: pwsh
      run: |
        Compress-Archive -Path artifacts/publish/${{ env.PROJECT_NAME }}/release_win-x64/* -DestinationPath ${{ env.ASSEMBLY_NAME }}-win-x64.zip

    - name: Generate checksum
      shell: pwsh
      run: |
        $hash = Get-FileHash -Path ${{ env.ASSEMBLY_NAME }}-win-x64.zip -Algorithm SHA256
        "$($hash.Hash)  ${{ env.ASSEMBLY_NAME }}-win-x64.zip" | Out-File -FilePath checksum-win-x64.txt -Encoding ascii

    - name: Upload artifacts
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: ${{ env.ASSEMBLY_NAME }}-win-x64
        path: |
          ${{ env.ASSEMBLY_NAME }}-win-x64.zip
          checksum-win-x64.txt

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Download artifacts
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7

    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae # v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: v${{ steps.version.outputs.version }}
        draft: false
        prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        generate_release_notes: true
        files: |
          ${{ env.ASSEMBLY_NAME }}-win-x64/${{ env.ASSEMBLY_NAME }}-win-x64.zip
          ${{ env.ASSEMBLY_NAME }}-win-x64/checksum-win-x64.txt
